<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0b4232"/>

  <!-- Running figure silhouette (simplified) -->
  <!-- Head -->
  <circle cx="38" cy="13" r="5" fill="white"/>

  <!-- Body / torso leaning forward -->
  <line x1="38" y1="18" x2="30" y2="34" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Back arm (trailing behind) -->
  <line x1="34" y1="22" x2="44" y2="28" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Front arm (reaching forward) -->
  <line x1="34" y1="22" x2="23" y2="26" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Back leg (trailing) -->
  <line x1="30" y1="34" x2="38" y2="46" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Back foot -->
  <line x1="38" y1="46" x2="45" y2="42" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Front leg (striking forward) -->
  <line x1="30" y1="34" x2="22" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Front foot -->
  <line x1="22" y1="44" x2="15" y2="46" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Checkmark / award accent (bottom right) -->
  <circle cx="50" cy="50" r="10" fill="#22c55e"/>
  <polyline points="44,50 48,55 56,44" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>